<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ArcBreaker: Ringfall Arena</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="ArcBreaker: Ringfall Arena is a fast arcade game where timing and precision matter." />
  <link rel="stylesheet" href="/site/style.css" />
</head>

<body>
<header class="top">
  <div class="topbar">
    <div class="brand">
      <img class="appicon" src="/assets/App_icon_2.png" alt="ArcBreaker app icon" />
      <div class="brandtext">
        <div class="title">ARC</div>
        <div class="title">BREAKER</div>
        <div class="subtitle">RINGFALL ARENA</div>
      </div>
    </div>

    <div class="top-actions">
      <div class="lang" aria-label="Language">
        <button onclick="setLang('de')">DE</button>
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('es')">ES</button>
        <button onclick="setLang('fr')">FR</button>
      </div>

      <nav class="nav">
        <a class="navlink" href="/" data-i18n="nav_home">Home</a>
        <a class="navlink" href="/support/" data-i18n="nav_support">Support</a>
        <a class="navlink" href="/privacy/" data-i18n="nav_privacy">Privacy</a>
      </nav>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <div>
      <div class="hero-card">
        <div class="hero-title">
          <div class="hero-title-line">ARC</div>
          <div class="hero-title-line">BREAKER</div>
          <div class="hero-sub">RINGFALL ARENA</div>
        </div>

        <p class="hero-copy" id="heroCopy"></p>

        <div class="cta-row">
          <a class="primary" href="https://apps.apple.com/us/app/arcbreaker-ringfall-arena/id6757078402" target="_blank" rel="noopener">
            <span class="pill" data-i18n="download_now">Download now</span>
            <img class="badge" src="/assets/Download_on_the_App_Store_Badge_US.svg" alt="Download on the App Store" />
          </a>
          <a class="secondary" href="#screens" data-i18n="see_screens">See screenshots</a>
        </div>
      </div>
    </div>

    <a class="storecard" href="https://apps.apple.com/us/app/arcbreaker-ringfall-arena/id6757078402" target="_blank" rel="noopener" aria-label="Open ArcBreaker on the App Store">
      <div class="store-top">
        <img class="storeicon" src="/assets/App_icon_2.png" alt="ArcBreaker app icon" />
        <div class="storemeta">
          <div class="storename">ArcBreaker Ringfall Arena</div>
          <div class="storehint" data-i18n="store_hint">Tap to open in the App Store</div>
        </div>
      </div>

      <div class="availability-card">
        <div class="avail-title" data-i18n="avail_title">Available now</div>
        <div class="avail-list" id="availNow"></div>

        <div class="avail-title" style="margin-top:12px;" data-i18n="coming_title">Coming soon</div>
        <div class="avail-list" id="availSoon"></div>
      </div>
    </a>
  </section>

  <section id="screens">
    <h2 data-i18n="shots_title">Screenshots</h2>
    <div class="gallery modern">
      <figure>
        <img class="shot" src="/assets/MakePoints.jpg" alt="ArcBreaker screenshot: Make points" loading="lazy" />
        <figcaption data-i18n="cap_makepoints">Make points</figcaption>
      </figure>
      <figure>
        <img class="shot" src="/assets/ControlYourHalf.jpg" alt="ArcBreaker screenshot: Control your half" loading="lazy" />
        <figcaption data-i18n="cap_control">Control your half</figcaption>
      </figure>
      <figure>
        <img class="shot" src="/assets/Powerups.jpg" alt="ArcBreaker screenshot: Use powerups" loading="lazy" />
        <figcaption data-i18n="cap_powerups">Use power-ups</figcaption>
      </figure>
      <figure>
        <img class="shot" src="/assets/LevelUp.jpg" alt="ArcBreaker screenshot: Level up" loading="lazy" />
        <figcaption data-i18n="cap_levelup">Level up</figcaption>
      </figure>
      <figure>
        <img class="shot" src="/assets/leaderboards.jpg" alt="ArcBreaker screenshot: Leaderboards" loading="lazy" />
        <figcaption data-i18n="cap_leaderboards">Leaderboards</figcaption>
      </figure>
    </div>
  </section>

  <section>
    <h2 data-i18n="availability_title">Availability</h2>
    <p><strong data-i18n="availability_label">Currently available in:</strong> <span id="avail"></span></p>
    <p class="muted"><span data-i18n="updated_label">Last updated:</span> <span id="availUpdated"></span></p>
  </section>
</main>

<footer>
  © 2026 HafenEnte · Swen Grünwald
</footer>

<script>
const availabilityNow = ["Sweden", "Norway", "Finland", "Philippines"]; 
const availabilitySoon = ["Germany", "Austria", "Switzerland"]; 
const availabilityUpdated = "2026-02-22";

function renderCountryPills(el, list) {
  el.innerHTML = list.map(c => `<span class="chip">${c}</span>`).join('');
}

renderCountryPills(document.getElementById('availNow'), availabilityNow);
renderCountryPills(document.getElementById('availSoon'), availabilitySoon);

// keep existing availability section text
const availability = availabilityNow.join(", ");
document.getElementById('avail').textContent = availability;
document.getElementById('availUpdated').textContent = availabilityUpdated;

const i18n = {
  en: {
    nav_home: "Home",
    nav_support: "Support",
    nav_privacy: "Privacy",
    download_now: "Download now",
    see_screens: "See screenshots",
    store_hint: "Tap to open in the App Store",
    avail_title: "Available now",
    coming_title: "Coming soon",
    hero: "ArcBreaker is a fast arcade game where timing and precision matter. Break bricks, protect the lower half, collect power-ups and climb the leaderboard. It's built for casual, quick sessions and includes Game Center integration for global and friends leaderboards.",
    shots_title: "Screenshots",
    availability_title: "Availability",
    availability_label: "Currently available in:",
    updated_label: "Last updated:",
    cap_makepoints: "Make points",
    cap_control: "Control your half",
    cap_powerups: "Use power-ups",
    cap_levelup: "Level up",
    cap_leaderboards: "Leaderboards",
  },
  de: {
    nav_home: "Start",
    nav_support: "Support",
    nav_privacy: "Datenschutz",
    download_now: "Jetzt laden",
    see_screens: "Screenshots ansehen",
    store_hint: "Tippen, um den App Store zu öffnen",
    avail_title: "Jetzt verfügbar",
    coming_title: "Demnächst",
    hero: "ArcBreaker ist ein schnelles Arcade-Spiel, bei dem Timing und Präzision zählen. Zerstöre Blöcke, schütze die untere Hälfte, sammle Power-ups und klettere in der Bestenliste. Gebaut für kurze, lockere Sessions – mit Game-Center-Integration für globale und Freunde-Bestenlisten.",
    shots_title: "Screenshots",
    availability_title: "Verfügbarkeit",
    availability_label: "Aktuell verfügbar in:",
    updated_label: "Zuletzt aktualisiert:",
    cap_makepoints: "Punkte machen",
    cap_control: "Kontrolliere deine Hälfte",
    cap_powerups: "Power-ups nutzen",
    cap_levelup: "Level up",
    cap_leaderboards: "Bestenlisten",
  },
  es: {
    nav_home: "Inicio",
    nav_support: "Soporte",
    nav_privacy: "Privacidad",
    download_now: "Descargar",
    see_screens: "Ver capturas",
    store_hint: "Toca para abrir la App Store",
    avail_title: "Disponible",
    coming_title: "Próximamente",
    hero: "ArcBreaker es un juego arcade rápido donde el tiempo y la precisión importan. Rompe bloques, protege la mitad inferior, recoge potenciadores y sube en la clasificación. Está pensado para sesiones cortas y casuales e incluye integración con Game Center para clasificaciones globales y de amigos.",
    shots_title: "Capturas",
    availability_title: "Disponibilidad",
    availability_label: "Disponible actualmente en:",
    updated_label: "Última actualización:",

    cap_leaderboards: "Clasificaciones",
  },
  fr: {
    nav_home: "Accueil",
    nav_support: "Assistance",
    nav_privacy: "Confidentialité",
    download_now: "Télécharger",
    see_screens: "Voir les captures",
    store_hint: "Touchez pour ouvrir l’App Store",
    avail_title: "Disponible",
    coming_title: "Bientôt",
    hero: "ArcBreaker est un jeu d'arcade rapide où le timing et la précision comptent. Cassez des briques, protégez la moitié inférieure, récupérez des power-ups et grimpez dans le classement. Conçu pour des sessions courtes et casual, avec intégration Game Center pour les classements mondiaux et amis.",
    shots_title: "Captures d'écran",
    availability_title: "Disponibilité",
    availability_label: "Disponible actuellement en :",
    updated_label: "Dernière mise à jour :",
    cap_makepoints: "Marquer des points",
    cap_control: "Contrôlez votre moitié",
    cap_powerups: "Utiliser des power-ups",
    cap_levelup: "Monter de niveau",
    cap_leaderboards: "Classements",
  },
};

function detectLang() {
  const lang = navigator.language.slice(0,2);
  return i18n[lang] ? lang : 'en';
}

function applyI18n(lang) {
  const dict = i18n[lang] || i18n.en;
  document.documentElement.lang = lang;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (dict[key]) el.textContent = dict[key];
  });

  document.getElementById('heroCopy').textContent = dict.hero;
}

function setLang(lang) {
  applyI18n(lang);
}

applyI18n(detectLang());
</script>
</body>
</html>
